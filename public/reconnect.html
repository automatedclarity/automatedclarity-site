<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reconnect affected inboxes</title>
  <style>
    :root{
      --bg:#f4f6f8;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#667085;
      --line:#e7e7e7;
      --line-soft:#ececec;
      --warn:#f59e0b;
      --warn-bg:#f7e7b2;
      --danger:#b42318;
      --danger-bg:#fde8e8;
      --ok:#256c3f;
      --ok-bg:#e6f4ea;
      --navy:#0b1220;
      --shadow:0 6px 20px rgba(0,0,0,.06);
      --radius:14px;
    }

    * { box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }

    .wrap{
      padding:24px 12px;
    }

    .card{
      max-width:560px;
      margin:0 auto;
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .topbar{
      height:6px;
      background:var(--warn);
    }

    .inner{
      padding:26px;
    }

    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:var(--warn-bg);
      color:#9a4a07;
      font-size:12px;
      font-weight:700;
    }

    h1{
      margin:18px 0 16px 0;
      font-size:30px;
      line-height:1.1;
      letter-spacing:-0.3px;
    }

    .lead{
      margin:0 0 24px 0;
      color:#475467;
      font-size:16px;
      line-height:1.6;
    }

    .box{
      border:1px solid var(--line);
      border-radius:10px;
      padding:18px;
      margin-top:14px;
      background:#fff;
    }

    .box.soft{
      border-style:dashed;
      color:#667085;
      background:#fafafa;
    }

    .box.success{
      border-color:#b7e1c2;
      background:#f6fbf7;
    }

    .box-title{
      font-weight:800;
      font-size:18px;
      margin:0 0 12px 0;
    }

    .inbox{
      display:flex;
      gap:14px;
      justify-content:space-between;
      align-items:flex-start;
      padding:16px 0;
      border-top:1px solid var(--line-soft);
    }

    .inbox:first-of-type{
      border-top:0;
      padding-top:6px;
    }

    .inbox-left{
      min-width:0;
      flex:1 1 auto;
    }

    .inbox-label{
      font-size:16px;
      font-weight:800;
      line-height:1.35;
      word-break:break-word;
    }

    .inbox-email{
      margin-top:6px;
      color:#2563eb;
      font-size:14px;
      line-height:1.45;
      word-break:break-word;
    }

    .status{
      margin-top:8px;
      font-size:13px;
      line-height:1.4;
      font-weight:800;
    }

    .status.danger{ color:var(--danger); }
    .status.ok{ color:var(--ok); }

    .inbox-right{
      flex:0 0 auto;
      width:auto;
      white-space:nowrap;
    }

    .btn{
      display:inline-block;
      padding:12px 18px;
      border-radius:8px;
      text-decoration:none;
      font-weight:800;
      border:1px solid var(--navy);
      background:var(--navy);
      color:#fff;
      cursor:pointer;
    }

    .btn.ok{
      background:var(--ok-bg);
      border-color:#b7e1c2;
      color:var(--ok);
      cursor:default;
    }

    .note{
      color:#444;
      line-height:1.6;
      font-size:15px;
    }

    .tiny{
      margin-top:10px;
      color:#777;
      font-size:12px;
      line-height:1.5;
    }

    .footer{
      margin-top:14px;
      width:100%;
      border-collapse:collapse;
      background:var(--navy);
      border-radius:10px;
      overflow:hidden;
    }

    .footer td{
      padding:14px 16px;
      vertical-align:middle;
    }

    .footer .right{
      text-align:right;
      color:#9ca3af;
      font-size:12px;
      letter-spacing:.2px;
    }

    .loading{
      color:#667085;
    }

    @media (max-width: 640px){
      .inner{ padding:22px; }
      h1{ font-size:24px; }
      .lead{ font-size:15px; }

      .inbox{
        display:block;
      }

      .inbox-right{
        margin-top:12px;
        width:100%;
        white-space:normal;
      }

      .btn{
        display:block;
        width:100%;
        text-align:center;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="topbar"></div>

      <div class="inner">
        <span class="badge">Recovery Access</span>

        <h1>Reconnect affected inboxes</h1>

        <p class="lead">
          We detected a connection interruption affecting your ACX monitoring layer.
          Review the affected inboxes below and reconnect any that require attention.
        </p>

        <div id="content" class="box soft">
          <div class="loading">Loading reconnect incident…</div>
        </div>

        <table class="footer" role="presentation" cellspacing="0" cellpadding="0">
          <tr>
            <td>
              <img
                src="https://notify.automatedclarity.com/assets/acx-logo-dark.png?v=5"
                alt="Automated Clarity"
                width="140"
                style="display:block;border:0;outline:none;text-decoration:none;height:auto;"
              />
            </td>
            <td class="right">Automated Clarity™ Monitoring</td>
          </tr>
        </table>
      </div>
    </div>
  </div>

  <script>
    function esc(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function params() {
      const q = new URLSearchParams(window.location.search);
      return {
        incident: q.get("incident") || "",
        token: q.get("token") || "",
        inbox: q.get("inbox") || "",
        start: q.get("start") || ""
      };
    }

    function reconnectHref(p, inboxKey) {
      const q = new URLSearchParams();
      q.set("incident", p.incident);
      q.set("token", p.token);
      if (inboxKey) q.set("inbox", inboxKey);
      return "/.netlify/functions/acx-reconnect-start?" + q.toString();
    }

    function renderError(message) {
      const content = document.getElementById("content");
      content.className = "box soft";
      content.innerHTML = `<div>${esc(message)}</div>`;
    }

    function buildStartNotice(p) {
      if (p.start !== "ok") return "";
      return `
        <div class="box success">
          <div class="box-title" style="margin-bottom:8px;">Reconnect started</div>
          <div class="note">
            Your inbox reconnect flow was opened successfully. Complete the reconnect step, then return here if needed.
          </div>
        </div>
      `;
    }

    function renderIncident(data, p) {
      const incident = data.incident || {};
      const inboxes = Array.isArray(incident.inboxes) ? incident.inboxes : [];

      if (!inboxes.length) {
        renderError("No inboxes were found for this reconnect incident.");
        return;
      }

      const rows = inboxes.map((inbox) => {
        const label = inbox.label || "Inbox";
        const email = inbox.email_masked || inbox.email_raw || "";
        const needsReconnect = Boolean(inbox.reconnect_required);
        const selected = Boolean(inbox.selected);
        const statusText = needsReconnect ? "Reconnect required" : "Connected";
        const statusClass = needsReconnect ? "danger" : "ok";

        let actionHtml = `<span class="btn ok">Connected</span>`;
        if (needsReconnect) {
          actionHtml = `<a class="btn" href="${esc(reconnectHref(p, inbox.key || inbox.email_raw || ""))}">Reconnect</a>`;
        }

        return `
          <div class="inbox">
            <div class="inbox-left">
              <div class="inbox-label">${esc(label)}${selected ? " • selected" : ""}</div>
              <div class="inbox-email">${esc(email)}</div>
              <div class="status ${statusClass}">${esc(statusText)}</div>
            </div>
            <div class="inbox-right">
              ${actionHtml}
            </div>
          </div>
        `;
      }).join("");

      const startNotice = buildStartNotice(p);

      const content = document.getElementById("content");
      content.className = "";
      content.innerHTML = `
        ${startNotice}
        <div class="box">
          <div class="box-title">Inbox status</div>
          ${rows}
        </div>
      `;

      const existingInfo = document.getElementById("what-happens-next");
      if (existingInfo) existingInfo.remove();

      const info = document.createElement("div");
      info.id = "what-happens-next";
      info.className = "box";
      info.innerHTML = `
        <div class="box-title">What happens next</div>
        <div class="note">
          Use the reconnect button beside any inbox that requires attention.
          Each button opens your secure, incident-specific recovery flow for that inbox.
        </div>
        <div class="tiny">
          These secure links expire automatically and are tied to this incident.
        </div>
      `;
      content.after(info);
    }

    async function init() {
      const p = params();

      if (!p.incident || !p.token) {
        renderError("This reconnect link is invalid.");
        return;
      }

      const apiUrl =
        "/.netlify/functions/acx-reconnect-incident?" +
        new URLSearchParams({
          incident: p.incident,
          token: p.token,
          inbox: p.inbox
        }).toString();

      try {
        const res = await fetch(apiUrl, { method: "GET", cache: "no-store" });
        const data = await res.json().catch(() => ({}));

        if (!res.ok || !data.ok) {
          const errorMap = {
            missing_incident_or_token: "This reconnect link is invalid.",
            incident_not_found: "This reconnect incident could not be found.",
            invalid_token: "This reconnect link is invalid.",
            incident_expired: "This reconnect link has expired."
          };

          renderError(errorMap[data.error] || "Unable to load this reconnect incident.");
          return;
        }

        renderIncident(data, p);
      } catch (err) {
        renderError("Unable to load this reconnect incident.");
      }
    }

    init();
  </script>
</body>
</html>
